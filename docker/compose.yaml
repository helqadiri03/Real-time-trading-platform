services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: timescaledb
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-market_data}
    ports:
      - "5432:5432"
    volumes:
      - ../database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/02_schema.sql
      - timescale_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - timescaledb

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  jobmanager:
    build: 
      context: ..
      dockerfile: docker/Dockerfile.flink
    container_name: jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/jobs"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  flink-job-submitter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.flink
    container_name: flink-job-submitter
    depends_on:
      jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: >
      bash -c "flink run -m jobmanager:8081 -py /opt/flink/streaming/flink_job.py"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
      - KAFKA_BROKER=kafka:29092
    restart: on-failure

  taskmanager:
    build: 
      context: ..
      dockerfile: docker/Dockerfile.flink
    container_name: taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2

  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.producer
    container_name: python-producer
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-dummy_key_for_setup}
      - KAFKA_BROKER=kafka:29092
    volumes:
      - ../producer:/app/producer

volumes:
  timescale_data:
