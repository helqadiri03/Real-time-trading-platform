apiVersion: 1

groups:
  - orgId: 1
    name: "Trading Alerts"
    folder: "Trading"
    interval: 1m
    rules:
      - uid: "price-limit-alert"
        title: "BTCUSDT Price Limit Exceeded"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "timescaledb"
            model:
              editorMode: builder
              format: table
              rawSql: "SELECT time, close FROM candles WHERE symbol = 'BINANCE:BTCUSDT' ORDER BY time DESC LIMIT 1"
              refId: "A"
              type: "postgres"
              rawQuery: true
          - refId: "B"
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: "C"
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 78000
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              type: math
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "BTCUSDT price exploded above 78000"
          description: "The close price of BTCUSDT on the 1-minute candle is above 78000."
        labels:
          severity: "critical"
